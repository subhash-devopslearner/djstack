name: "Azure GitOps Pipeline"

on:
  push:
    branches:
      - main

permissions:
  id-token: write  # Required for Azure OIDC login
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Azure OIDC Authentication
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 3. Setup Terraform CLI
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      # 4. STEP 1: Provision Core Infrastructure (RG, ACR, Key Vault)
      - name: Terraform Core (Apply)
        env:
          TF_VAR_django_secret_key: ${{ secrets.DJANGO_SECRET_KEY }}
          TF_VAR_postgres_db_password: ${{ secrets.POSTGRES_DB_PASSWORD }}
        run: |
          cd azure-infra-core
          terraform init
          terraform apply -auto-approve

      # STEP 2: Build & Push Images to Private Registry (ACR)
      - name: ACR Login & Image Build/Push
        run: |
          az acr login --name subhashdevopsregistry
          
          # 1. Build and Push Django
          docker build -t subhashdevopsregistry.azurecr.io/django-app:v1 -f Dockerfile .
          docker push subhashdevopsregistry.azurecr.io/django-app:v1

          # 2. Pull, Tag, and Push Postgres (Avoids Docker Hub rate limits)
          docker pull postgres:15-alpine
          docker tag postgres:15-alpine subhashdevopsregistry.azurecr.io/postgres:15-alpine
          docker push subhashdevopsregistry.azurecr.io/postgres:15-alpine

      # 6. STEP 3: Provision Application Layer (ACI Container Group)
      - name: Terraform Apps (Apply)
        run: |
          cd azure-infra-apps
          terraform init
          terraform apply -auto-approve