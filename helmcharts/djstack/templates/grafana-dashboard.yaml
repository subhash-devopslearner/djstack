apiVersion: v1
kind: ConfigMap
metadata:
  name: django-grafana-dashboard
  labels:
    grafana_dashboard: "1"
data:
  django-dashboard.json: |
    {
      "title": "Django App",
      "panels": [
        {
          "id": 1,
          "title": "Request Rate",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "rate(django_http_requests_total_by_method_total[1m])",
              "refId": "A"
            }
          ],
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
        },
        {
          "id": 2,
          "title": "Response Time",
          "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "rate(django_http_requests_latency_seconds_by_view_method_sum[1m])",
              "refId": "A"
            }
          ],
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
        },
        {
          "id": 3,
          "title": "Total Pods",
          "type": "stat",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{phase=\"Running\", namespace=\"dev\"})",
              "refId": "A"
            }
          ],
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
        }
      ],
      "schemaVersion": 39,
      "time": { "from": "now-6h", "to": "now" },
      "refresh": "30s"
    }
