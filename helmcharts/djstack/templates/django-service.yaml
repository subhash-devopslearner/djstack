apiVersion: v1
kind: Service
metadata:
  name: django-service
  labels:
    app: django
spec:
  type: {{ .Values.django.service.type }}
  selector:
    app: django
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      name: web
      {{- if eq .Values.django.service.type "NodePort" }}
      nodePort: {{ .Values.django.service.nodePort }}
      {{- end }}
