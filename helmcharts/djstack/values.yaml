django:
  replicas: 3
  image: subhashdevopslearner/djstack-web
  tag: "v1.1.0"  
  workers: "2"
  resources:
    requests:
      memory: "128Mi"
      cpu: "250m"
    limits:
      memory: "256Mi"
      cpu: "500m"

  nginx:
    image: nginx
    tag: "alpine"
    resources:
      requests:
        memory: "64Mi"
        cpu: "100m"
      limits:
        memory: "128Mi"
        cpu: "200m"
  
  config:
    debug: "True"
    dbHost: "postgres-service"
    dbPort: "5432"
    allowedHosts: "*"
    environment: "development"
    
  secret:
    secretKey: "django-testing-qtek#6qdie2xmqks60oi#1%6eiefmazw1m&cwn+0-nyk=h%uoa"
    dbName: "postgres"
    dbUser: "postgres"
    dbPassword: "postgres"

  service:
    type: ClusterIP
    port: 80
    targetPort: 80

postgres:
  image: postgres
  tag: "15"
  port: 5432
  targetPort: 5432
  storage: "1Gi"
  storageClass: ""
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

media:
  storage: "5Gi"
  storageClass: ""

ingress:
  className: nginx
  host: djstack-app.local